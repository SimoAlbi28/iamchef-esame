# Server
server.port=8080

# H2 Database
spring.datasource.url=jdbc:h2:mem:iamchef
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect
spring.jpa.open-in-view=false

# Spoonacular API
spoonacular.api.key=1338e1d23bdb4938a728453ef451035a
spoonacular.api.base-url=https://api.spoonacular.com

# JWT
jwt.secret=iamchef-super-secret-key-for-jwt-token-generation-must-be-at-least-256-bits-long
jwt.expiration-ms=86400000
